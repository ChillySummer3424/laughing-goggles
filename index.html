<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blooket Bot</title>
    <style>
        /* CSS: Making it look clean and modern */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 { margin-top: 0; color: #333; font-size: 1.5rem; }

        .form-group { margin-bottom: 1rem; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #666;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4A90E2;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #357ABD; }

        /* Styles for the dynamic list */
        #userList {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            list-style: none;
            padding-left: 0;
        }

        #userList li {
            background: #f8f9fa;
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #444;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Enter Blooket</h2>
    
    <form id="entryForm">
        <div class="form-group">
            <label for="firstName">Game ID</label>
        </div>

        <div class="form-group">
            <label for="lastName">Name to flood</label>
        </div>

        <button type="submit">Enter</button>
    </form>
</script>
</body>
</html>
